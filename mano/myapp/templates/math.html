<!DOCTYPE html>
<html>
<head>
    <title>GST Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #e809ce, #1cc88a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 350px;
            text-align: center;
        }

        h1 {
            margin-bottom: 25px;
            color: #333;
        }

        label {
            font-weight: bold;
            display: block;
            text-align: left;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #4e73df;
            box-shadow: 0 0 5px rgba(78, 115, 223, 0.5);
        }

        button {
            width: 100%;
            padding: 10px;
            background: #4e73df;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #2e59d9;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            border-radius: 8px;
            background: #f8f9fc;
            font-size: 18px;
            font-weight: bold;
        }

        .error {
            color: red;
        }

        .success {
            color: #1cc88a;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>GST Calculator</h1>
    <h4>MANORAJAPRIYAN.L.E </h4>
        <h4>212225040227</h4>
    <form method="post">
        {% csrf_token %}
        <label for="price">Price :</label>
        <input type="text" id="price" name="price" required>

        <label for="gst">GST (R in %):</label>
        <input type="text" id="gst" name="gst" required>

        <button type="submit">Calculate</button>
    </form>

    {% if gst_amt is not None %}
        <div class="result">
            {% if "Error" in gst_amt|stringformat:"s" %}
                <p class="error">{{ gst_amt }}</p>
            {% else %}
                <p class="success">Total Price After GST: ₹ {{ gst_amt|stringformat:".2f" }}</p>
            {% endif %}
        </div>
    {% endif %}
</div>

</body>
</html>
